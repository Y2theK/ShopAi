server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    client_max_body_size 10m;

    # Laravel routes go to PHP-FPM in the app container. SCRIPT_FILENAME is
    # the path inside the app container — the file does not exist here.
    location ~ ^/(api|sanctum|up)(/|$) {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
    }

    # Vite build assets are content-hashed, safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Vue Router history mode: deep links fall back to the SPA entry point.
    location / {
        try_files $uri /index.html;
    }
}
