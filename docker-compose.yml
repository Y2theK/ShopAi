name: ShopAi

# Shared definition for both Laravel containers (app + queue worker).
x-backend: &backend
  build: ./backend
  environment:
    APP_NAME: ShopAi
    APP_ENV: local
    APP_DEBUG: "false"
    APP_KEY: "${APP_KEY:?APP_KEY is missing — copy .env.example to .env and set it (see .env.example)}"
    APP_URL: http://localhost:8080
    FRONTEND_URL: http://localhost:8080
    SANCTUM_STATEFUL_DOMAINS: localhost:8080
    DB_CONNECTION: pgsql
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_DATABASE: ShopAi
    DB_USERNAME: ShopAi
    DB_PASSWORD: ${DB_PASSWORD:-ShopAi-local-pw}
    SESSION_DRIVER: database
    CACHE_STORE: database
    QUEUE_CONNECTION: database
    LOG_CHANNEL: stderr
    LOG_LEVEL: info
    # Chat agents: OpenRouter is primary, OpenAI is the failover
    # (config/ai.php "chat" block — all overridable from .env).
    OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
    OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    AI_CHAT_PROVIDER: ${AI_CHAT_PROVIDER:-openrouter}
    AI_CHAT_MODEL: ${AI_CHAT_MODEL:-google/gemma-4-31b-it:free}
    AI_CHAT_FALLBACK_PROVIDER: ${AI_CHAT_FALLBACK_PROVIDER:-openai}
    AI_CHAT_FALLBACK_MODEL: ${AI_CHAT_FALLBACK_MODEL:-}
  volumes:
    - storage-data:/var/www/storage/app

services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ShopAi
      POSTGRES_USER: ShopAi
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ShopAi-local-pw}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      # -h 127.0.0.1 forces TCP: during first-boot init Postgres runs a
      # socket-only temp server that would otherwise report healthy too early.
      test: ["CMD", "pg_isready", "-h", "127.0.0.1", "-U", "ShopAi", "-d", "ShopAi"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  app:
    <<: *backend
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # The entrypoint touches this file after migrations and caching finish.
      test: ["CMD", "test", "-f", "/tmp/app-ready"]
      interval: 3s
      timeout: 2s
      retries: 40
      start_period: 5s

  queue:
    <<: *backend
    command: ["php", "artisan", "queue:work", "--tries=1", "--max-time=3600"]
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      # 127.0.0.1, not localhost: busybox wget prefers ::1 and nginx only
      # listens on IPv4.
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/up"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s

volumes:
  postgres-data:
  storage-data:
