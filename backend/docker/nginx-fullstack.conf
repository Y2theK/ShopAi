# All-in-one mode (root Dockerfile): nginx serves the built SPA and talks
# to php-fpm on localhost. app-web rewrites the listen port to $PORT.
server {
    listen 8080;
    server_name _;

    root /var/www/spa;
    index index.html;

    client_max_body_size 10m;

    location ~ ^/(api|sanctum|up)(/|$) {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
    }

    # Vite build assets are content-hashed, safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Vue Router history mode: deep links fall back to the SPA entry point.
    location / {
        try_files $uri /index.html;
    }
}
