# Standalone HTTP mode for single-container hosts (Render, Railway, ...):
# nginx and php-fpm run in the same container, started by app-web.
# app-web rewrites the listen port to $PORT at startup.
server {
    listen 8080;
    server_name _;

    root /var/www/public;
    index index.php;

    client_max_body_size 10m;

    location / {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param SCRIPT_NAME /index.php;
    }
}
